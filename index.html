<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Boleiros de Cristo</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

</head>

<body>

    <div class="container">

        <h1>⚽ Boleiros de Cristo</h1>

        <div class="card">

            <h3>📸 Foto da Capa</h3>

            <input type="file"
                   id="capa"
                   accept="image/*">

            <div id="statusCapa"
                 class="preview-ok">

                Nenhuma imagem selecionada

            </div>

        </div>

        <div class="card">

            <h3>🏆 Artilheiro</h3>

            <input type="file"
                   id="artilheiro"
                   accept="image/*">

            <div id="statusArtilheiro"
                 class="preview-ok">

                Nenhuma imagem selecionada

            </div>

        </div>

        <div class="card">

            <h3>⚽ Quantidade de gols</h3>

            <input type="number"
                   id="gols"
                   value="1"
                   min="0">

        </div>

        <button id="gerar">

            GERAR ARTES

        </button>

    </div>

    <!-- MODAL CAPA -->

    <div id="modalCapa"
         class="modal">

        <div class="modal-content">

            <h3>Ajuste a foto da capa</h3>

            <img id="cropImageCapa">

            <button id="salvarCapa"
                    class="btn-modal">

                Salvar Capa

            </button>

        </div>

    </div>

    <!-- MODAL ARTILHEIRO -->

    <div id="modalArtilheiro"
         class="modal">

        <div class="modal-content">

            <h3>Ajuste a foto do artilheiro</h3>

            <img id="cropImageArtilheiro">

            <button id="salvarArtilheiro"
                    class="btn-modal">

                Salvar Artilheiro

            </button>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <script src="app.js"></script>

</body>

</html>
