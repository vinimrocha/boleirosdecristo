<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Boleiros de Cristo</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>


</head>

<body>


<header class="header">
    <h1>⚽ Boleiros de Cristo</h1>
    <p>Sorteador Oficial de Times</p>
</header>

<main class="container">

    <section class="card">

        <h2>📋 Jogadores Presentes</h2>

        <div id="contadorSelecionados" class="contador">
            👥 Selecionados: 0
        </div>

        <div id="listaJogadores" class="lista-jogadores"></div>

    </section>

    <section class="card">

        <h2>➕ Adicionar Convidado</h2>

        <div class="form-group">
            <label>Nome</label>
            <input
                type="text"
                id="convidadoNome"
                placeholder="Nome do convidado">
        </div>

        <div class="form-group">
            <label>Tipo</label>

            <select id="convidadoTipo">
                <option value="linha">Jogador de Linha</option>
                <option value="goleiro">Goleiro</option>
            </select>
        </div>

        <div class="form-group" id="categoriaContainer">
            <label>Categoria</label>

            <select id="convidadoCategoria">

                <option value="0">0</option>
                <option value="0.5">0.5</option>

                <option value="1">1</option>
                <option value="1.5">1.5</option>

                <option value="2">2</option>
                <option value="2.5">2.5</option>

                <option value="3">3</option>
                <option value="3.5">3.5</option>

                <option value="4">4</option>
                <option value="4.5">4.5</option>

                <option value="5">5</option>

            </select>
        </div>

        <button id="btnAdicionar">
            Adicionar Convidado
        </button>

    </section>


    <section class="card">

        <h2>⚙️ Configuração</h2>

        <div class="radio-group">

            <label>
                <input
                    type="radio"
                    name="jogadoresPorTime"
                    value="4">
                4 por time
            </label>

            <label>
                <input
                    type="radio"
                    name="jogadoresPorTime"
                    value="5">
                5 por time
            </label>

            <label>
                <input
                    type="radio"
                    name="jogadoresPorTime"
                    value="6"
                    checked>
                6 por time
            </label>

        </div>

        <button id="btnSortear" class="btn-primary">
            🎲 Sortear Times
        </button>

        <button id="btnDesmarcar" class="btn-secondary">
            ❌ Desmarcar Todos
        </button>

    </section>

    <section
        id="resultadoContainer"
        class="resultado-container">

        <div class="acoes-resultado">

            <button
                id="btnResortear"
                class="btn-secondary"
                style="display:none;">

                🔄 Sortear Novamente

            </button>

            <button
                id="btnCompartilhar"
                class="btn-success"
                style="display:none;">

                📤 Compartilhar Imagem

            </button>

        </div>

        <div id="resultado"></div>

    </section>

</main>

<!-- Rodapé do site -->
<footer class="site-footer">
    <p>
        Desenvolvido por 
        <a href="https://www.linkedin.com/in/vinimartins/" 
           target="_blank" 
           rel="noopener noreferrer">
            Vinicios Martins
        </a>
    </p>
</footer>

<script src="js/jogadores.js"></script>
<script src="js/app.js"></script>


</body>

</html>
