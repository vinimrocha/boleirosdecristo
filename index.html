<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artes Futebol</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>
<body>

<h1>⚽ Boleiros de Cristo</h1>

<div class="card">

    <h3>Capa</h3>

    <input type="file" id="capa">

    <div class="crop-container">
        <img id="previewCapa">
    </div>

</div>

<div class="card">

    <h3>Artilheiro</h3>

    <input type="file" id="artilheiro">

    <div class="crop-container">
        <img id="previewArtilheiro">
    </div>

</div>

<br>

<label>Gols:</label>
<input type="number" id="gols" value="3">

<br><br>

<button id="gerar">Gerar Artes</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script src="app.js"></script>

</body>
</html>
